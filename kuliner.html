<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Web Kuliner Indonesia</title>
</head>

<body class="min-h-screen flex flex-col">

    <!-- HEADER -->
    <header class="bg-amber-800 text-white p-6">
        Header
    </header>

    <!-- CONTENT -->
    <div class="flex-1 p-6">
        <div class="grid md:grid-cols-4 gap-6">

            <!-- NAVIGATION -->
            <nav class="bg-gray-200 p-6 rounded">
                Navigation
            </nav>

            <!-- MAIN -->
            <main class="md:col-span-2 bg-gray-100 p-6 rounded">
                Main Content
            </main>

            <!-- SIDEBAR -->
            <aside class="bg-gray-200 p-6 rounded">
                Sidebar
            </aside>

        </div>
    </div>

    <!-- FOOTER -->
    <footer class="bg-amber-800 text-white p-6 text-center">
        Footer
    </footer>

</body>
</html>
